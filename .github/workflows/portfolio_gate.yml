name: portfolio-gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  portfolio-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt

      - name: Tests
        run: |
          .venv/bin/python -m pytest -q

      - name: Portfolio operator gate (export)
        id: gate
        if: always()
        run: |
          rm -rf /tmp/portfolio_gate_export
          mkdir -p /tmp/portfolio_gate_export

          set +e
          .venv/bin/python -m app.main operator portfolio-operator-gate --json \
            --repos-map data/portfolio/repos.json \
            --hide-samples --strict --enforce-sla --jobs 4 \
            --export-path /tmp/portfolio_gate_export \
            > /tmp/portfolio_gate_export/stdout.json
          code=$?
          if [ ! -f /tmp/portfolio_gate_export/stdout.json ]; then
            echo "{\"status\":\"missing_stdout\",\"reason\":\"portfolio gate command did not emit stdout\"}" > /tmp/portfolio_gate_export/stdout.json
          fi
          if [ ! -f /tmp/portfolio_gate_export/bundle_meta.json ]; then
            echo "{\"status\":\"missing_bundle_meta\",\"exit_code\":${code}}" > /tmp/portfolio_gate_export/bundle_meta.json
          fi
          echo "exit_code=$code" >> $GITHUB_OUTPUT
          echo "Gate exit code: $code"
          if [ "$code" -ne 0 ] && [ "$code" -ne 2 ] && [ "$code" -ne 3 ] && [ "$code" -ne 4 ]; then
            exit "$code"
          fi
          exit 0

      - name: Upload portfolio gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-gate-artifacts
          path: |
            /tmp/portfolio_gate_export/bundle_meta.json
            /tmp/portfolio_gate_export/portfolio_operator_gate.json
            /tmp/portfolio_gate_export/portfolio_snapshot_latest.json
            /tmp/portfolio_gate_export/portfolio_snapshot_diff.json
            /tmp/portfolio_gate_export/stdout.json
          if-no-files-found: warn
