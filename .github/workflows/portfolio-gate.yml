name: Portfolio Gate

on:
  pull_request:
  push:
    branches: [ "main" ]
  schedule:
    - cron: "0 9 * * 1"  # Mondays 09:00 UTC (nightly-ish full contract lane)

jobs:
  portfolio-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Tests (fast lane)
        run: |
          python -m pytest -q -m "not slow"

      - name: "Tests (slow lane: main + schedule)"
        if: github.event_name == 'push' || github.event_name == 'schedule'
        run: |
          python -m pytest -q -m "slow"

      - name: Run portfolio gate (capture status)
        run: |
          rm -rf ci_artifacts && mkdir -p ci_artifacts/portfolio
          set +e
          python -m app.main operator portfolio-gate \
            --json \
            --repos-map data/portfolio/repos.json \
            --strict \
            --enforce-sla \
            --hide-samples \
            --jobs 4 \
            --export-path ci_artifacts/portfolio
          code=$?
          echo "Gate exit code: $code"
          if [ "$code" -ne 0 ] && [ "$code" -ne 2 ] && [ "$code" -ne 3 ] && [ "$code" -ne 4 ]; then
            exit "$code"
          fi
          exit 0

      - name: Upload portfolio artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-gate
          path: ci_artifacts/portfolio
